<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마약·약물오남용 예방 상황카드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #e8e4df; min-height: 100vh; padding: 32px 16px; }

  .page-title { text-align: center; margin-bottom: 28px; }
  .page-title h1 { font-size: 22px; font-weight: 900; color: #3C3489; margin-bottom: 4px; }
  .page-title p { font-size: 13px; color: #888; }

  .card-wrap { max-width: 480px; margin: 0 auto 40px; }
  .card-label {
    font-size: 13px; font-weight: 700; color: #3C3489;
    border-left: 4px solid #6B5CE7; padding-left: 10px;
    margin-bottom: 10px;
  }

  .card {
    width: 100%; border-radius: 16px; overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    background: #fff8f0;
  }

  .front-header {
    background: linear-gradient(135deg, #4B3FA0, #6B5CE7);
    padding: 12px 16px 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-num-badge { color: white; font-size: 11px; font-weight: 900; letter-spacing: 2px; }
  .tag { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .tag-drug { background: #EEEDFE; color: #3C3489; }
  .tag-med { background: #E1F5EE; color: #085041; }

  .front-question {
    background: linear-gradient(135deg, #4B3FA0, #6B5CE7);
    color: white; font-size: 11px; text-align: center;
    padding: 6px 0 10px; letter-spacing: 1px;
  }

  .card-img { width: 100%; height: auto; display: block; }

  .situation-box {
    margin: 12px 14px 8px;
    background: #f0edf8; border-left: 4px solid #6B5CE7;
    border-radius: 0 10px 10px 0; padding: 10px 12px;
  }
  .situation-text { font-size: 11.5px; color: #2d2d2d; line-height: 1.7; word-break: keep-all; }

  .choices { padding: 0 14px 14px; display: flex; flex-direction: column; gap: 7px; }

  .choice-btn {
    display: flex; align-items: flex-start; gap: 8px;
    background: #f5f3fc; border: 1.5px solid #ddd8f5;
    border-radius: 10px; padding: 8px 11px;
    cursor: pointer; text-align: left; width: 100%;
    transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif;
  }
  .choice-btn:hover:not(:disabled) { background: #eeeafc; border-color: #b8b0f0; }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct { background: #E1F5EE; border-color: #1D9E75; }
  .choice-btn.wrong { background: #FCEBEB; border-color: #E24B4A; }
  .choice-btn.dimmed { opacity: 0.4; }

  .choice-num {
    width: 22px; height: 22px; background: #6B5CE7; color: white;
    border-radius: 50%; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .choice-btn.correct .choice-num { background: #1D9E75; }
  .choice-btn.wrong .choice-num { background: #E24B4A; }

  .choice-content { flex: 1; }
  .choice-text { font-size: 11px; color: #333; line-height: 1.6; word-break: keep-all; text-align: left; }
  .hint { font-size: 11px; margin-top: 5px; line-height: 1.5; display: none; word-break: keep-all; text-align: left; }
  .hint.show { display: block; }
  .hint.correct { color: #0F6E56; }
  .hint.wrong { color: #A32D2D; }

  .card-footer {
    background: #4B3FA0; color: rgba(255,255,255,0.8);
    font-size: 10px; text-align: center; padding: 7px;
  }
  .card-footer.answered { background: #1D9E75; }
</style>
</head>

   correct:1,hints:["온라인 친구라도 실제로는 모르는 사람이에요. 약물 수령은 절대 안 돼요.","증거를 남기고 어른께 알리는 게 가장 현명해요!","마약류 소지만으로도 처벌받을 수 있어요."]},
  {num:7,tag:"약물 오남용",tagType:"med",
   situation:"감기에 걸려 약국에서 산 감기약을 먹었는데, 친구가 \"그 약 먹으면 졸려서 잠 잘 온다더라, 나한테도 좀 줘\"라고 한다.",
   choices:["친구가 원하니까 내 약 몇 알을 나눠준다.","거절하고, 친구에게 불편하면 직접 약국이나 병원을 가보라고 안내한다.","친구가 불쌍하니까 이번 한 번만 준다."],
   correct:1,hints:["처방·구매한 약을 타인에게 주는 것은 약사법 위반이에요.","약은 본인에게만 복용해야 하고, 타인에게 나눠주면 안 돼요!","의약품 무단 제공은 본인도 친구도 모두 위험하게 만들어요."]},
  {num:8,tag:"마약 권유",tagType:"drug",
   situation:"학교 축제 날, 처음 보는 학생이 \"이거 먹으면 기분이 엄청 좋아져, 다 같이 먹자\"라며 음료에 뭔가를 타려고 한다.",
   choices:["축제 날이니까 분위기에 맞게 같이 마신다.","단호히 거절하고, 해당 상황을 즉시 선생님이나 어른께 알린다.","한 번만 마시고 그 이후엔 안 마신다."],
   correct:1,hints:["음료에 약물을 타는 행위는 매우 위험해요. 마약류일 수 있어요.","의심되는 상황은 즉시 어른께 알려야 해요!","단 한 번도 위험해요. 약물 탄 음료는 절대 마시면 안 돼요."]}
];

const labels = ['①','②','③'];
const answered = new Array(8).fill(false);

function renderAll() {
  const container = document.getElementById('cards-container');
  container.innerHTML = cards.map(c => `
    <div class="card-wrap">
      <div class="card-label">CARD ${String(c.num).padStart(2,'0')} — ${c.tag}</div>
      <div class="card">
        <div class="front-header">
          <span class="card-num-badge">CARD ${String(c.num).padStart(2,'0')}</span>
          <span class="tag ${c.tagType==='drug'?'tag-drug':'tag-med'}">${c.tag}</span>
        </div>
        <div class="front-question">이 상황, 어떻게 할까?</div>
        <img class="card-img" src="${imgB64[c.num]}" alt="카드${c.num} 이미지">
        <div class="situation-box">
          <p class="situation-text">${c.situation}</p>
        </div>
        <div class="choices">
          ${c.choices.map((ch,i) => `
            <button class="choice-btn" id="cb${c.num}_${i}" onclick="pick(${c.num},${i})">
              <div class="choice-num">${labels[i]}</div>
              <div class="choice-content">
                <div class="choice-text">${ch}</div>
                <div class="hint" id="hint${c.num}_${i}"></div>
              </div>
            </button>`).join('')}
        </div>
        <div class="card-footer" id="footer${c.num}">선택지를 눌러 정답을 확인하세요</div>
      </div>
    </div>`).join('');
}

function pick(cardNum, i) {
  const idx = cardNum - 1;
  if (answered[idx]) return;
  answered[idx] = true;
  const c = cards[idx];
  c.choices.forEach((_,j) => {
    const btn = document.getElementById(`cb${cardNum}_${j}`);
    const hint = document.getElementById(`hint${cardNum}_${j}`);
    btn.disabled = true;
    if (j === c.correct) {
      btn.classList.add('correct');
      hint.textContent = '✓ ' + c.hints[j];
      hint.classList.add('hint', 'show', 'correct');
    } else if (j === i) {
      btn.classList.add('wrong');
      hint.textContent = '✗ ' + c.hints[j];
      hint.classList.add('hint', 'show', 'wrong');
    } else {
      btn.classList.add('dimmed');
    }
  });
  const footer = document.getElementById(`footer${cardNum}`);
  footer.textContent = i === c.correct ? '정답입니다!' : '오답입니다. 정답을 확인하세요.';
  footer.classList.toggle('answered', i === c.correct);
}

renderAll();
</script>
